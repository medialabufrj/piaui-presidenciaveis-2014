<!doctype html>
<html class="no-js">
    <head>
        <meta charset="utf-8">
        <title>medialab presidenciaveis 2014</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link rel="stylesheet" href="styles/main.css">
    </head>
    <body data-mode="Agenda">

        <div id="container">
            <div id="vis-control" class="vis-control">
                <div id="timeline-d3"></div>
                <div id="vis-filter-candidatos" class="vis-filter right"></div>
                <div id="vis-filter-vis" class="vis-filter"></div>
                <div id="vis-label-ext"></div>
            </div>

            <div id="vis-wrapper"></div>

            <div id="vis-tip">
                <div class="local string"></div>
                <h3 class="candidato string"></h3>
                <div><span class="categoria string"></span> <span class="data string"></span></div>
                <div class="atividade string"></div>
            </div>
            <div id="vis-control-2" class="vis-control">
                <div id="vis-legenda-color" class="vis-filter vis-label">
                    <span class="title">Cores</span>
                    <div class="aecio">Aécio Neves</div>
                    <div class="dilma">Dilma Rousseff</div>
                    <div class="marina">Marina Silva</div>
                </div>
                <div id="vis-legenda-size" class="vis-filter vis-label">
                    <span class="title">Tamanhos</span>
                    <div class="capital">Capital</div>
                    <div class="interior">Interior</div>
                </div>
                <div id="vis-filter-categorias" class="vis-filter"></div>
            </div>
            <div class="vis-footer">
                <dl>
                    <dt>Pesquisa e checagem de dados</dt>
                    <dd>Gabriela Caesar e Luiza Miguez</dd>
                </dl>
                <dl>
                    <dt>Visualização</dt>
                    <dd>Medialab.UFRJ</dd>
                </dl>
                <dl>
                    <dt>Design</dt>
                    <dd>Marlus Araujo</dd>
                </dl>
            </div>
        </div>

        <!-- Vendor libs via CDN (versões originais de 2014) -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/1.11.0/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/3.4.11/d3.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/underscore.js/1.7.0/underscore-min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/react/0.11.2/react.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/1.13.2/TweenLite.min.js"></script>

        <!-- App -->
        <script src="scripts/components.js"></script>
        <script src="scripts/main.js"></script>
    </body>
</html>
